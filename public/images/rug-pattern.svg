<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <!-- Light grey for carousel -->
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#aaaaaa"/>
      <stop offset="50%"  stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
  </defs>

  <!-- Black fill base -->
  <rect width="120" height="120" fill="#000"/>

  <!-- ═══ OUTER BORDER FRAME ═══ -->
  <rect x="2" y="2" width="116" height="116" fill="none" stroke="url(#g)" stroke-width="1.2"/>
  <rect x="5" y="5" width="110" height="110" fill="none" stroke="url(#g)" stroke-width="0.6"/>

  <!-- ═══ MAIN DIAMOND (rotated square) ═══ -->
  <!-- outer diamond -->
  <polygon points="60,8 112,60 60,112 8,60"
    fill="#000" stroke="url(#g)" stroke-width="1.3"/>
  <!-- mid diamond -->
  <polygon points="60,22 98,60 60,98 22,60"
    fill="#000" stroke="url(#g)" stroke-width="1"/>
  <!-- inner diamond -->
  <polygon points="60,36 84,60 60,84 36,60"
    fill="#000" stroke="url(#g)" stroke-width="0.9"/>
  <!-- tiny center diamond -->
  <polygon points="60,50 70,60 60,70 50,60"
    fill="#000" stroke="url(#g)" stroke-width="0.8"/>

  <!-- ═══ CORNER DIAMONDS (4 corners) ═══ -->
  <!-- top-left -->
  <polygon points="14,2 26,14 14,26 2,14"
    fill="#000" stroke="url(#g)" stroke-width="0.9"/>
  <polygon points="14,6 22,14 14,22 6,14"
    fill="#000" stroke="url(#g)" stroke-width="0.6"/>
  <!-- top-right -->
  <polygon points="106,2 118,14 106,26 94,14"
    fill="#000" stroke="url(#g)" stroke-width="0.9"/>
  <polygon points="106,6 114,14 106,22 98,14"
    fill="#000" stroke="url(#g)" stroke-width="0.6"/>
  <!-- bottom-left -->
  <polygon points="14,94 26,106 14,118 2,106"
    fill="#000" stroke="url(#g)" stroke-width="0.9"/>
  <polygon points="14,98 22,106 14,114 6,106"
    fill="#000" stroke="url(#g)" stroke-width="0.6"/>
  <!-- bottom-right -->
  <polygon points="106,94 118,106 106,118 94,106"
    fill="#000" stroke="url(#g)" stroke-width="0.9"/>
  <polygon points="106,98 114,106 106,114 98,106"
    fill="#000" stroke="url(#g)" stroke-width="0.6"/>

  <!-- ═══ CROSS AXES (rug spine lines) ═══ -->
  <line x1="60" y1="2"  x2="60" y2="118" stroke="url(#g)" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="2"  y1="60" x2="118" y2="60" stroke="url(#g)" stroke-width="0.5" stroke-dasharray="3,4"/>

  <!-- ═══ DIAGONAL AXES ═══ -->
  <line x1="2"  y1="2"  x2="118" y2="118" stroke="url(#g)" stroke-width="0.4" stroke-dasharray="2,5"/>
  <line x1="118" y1="2" x2="2"   y2="118" stroke="url(#g)" stroke-width="0.4" stroke-dasharray="2,5"/>

  <!-- ═══ CURVED PETAL MOTIFS inside inner diamond ═══ -->
  <!-- 4 petals using cubic bezier curves -->
  <path d="M60,36 C72,44 72,56 60,50 C48,56 48,44 60,36Z"
    fill="#000" stroke="url(#g)" stroke-width="0.8"/>
  <path d="M84,60 C76,72 64,72 70,60 C64,48 76,48 84,60Z"
    fill="#000" stroke="url(#g)" stroke-width="0.8"/>
  <path d="M60,84 C48,76 48,64 60,70 C72,64 72,76 60,84Z"
    fill="#000" stroke="url(#g)" stroke-width="0.8"/>
  <path d="M36,60 C44,48 56,48 50,60 C56,72 44,72 36,60Z"
    fill="#000" stroke="url(#g)" stroke-width="0.8"/>

  <!-- ═══ MID-EDGE SMALL DIAMONDS ═══ -->
  <!-- top -->
  <polygon points="60,8 66,14 60,20 54,14"
    fill="#000" stroke="url(#g)" stroke-width="0.7"/>
  <!-- right -->
  <polygon points="100,60 106,66 100,72 94,66"
    fill="#000" stroke="url(#g)" stroke-width="0.7"/>
  <!-- bottom -->
  <polygon points="60,100 66,106 60,112 54,106"
    fill="#000" stroke="url(#g)" stroke-width="0.7"/>
  <!-- left -->
  <polygon points="20,60 26,66 20,72 14,66"
    fill="#000" stroke="url(#g)" stroke-width="0.7"/>

  <!-- ═══ CENTER DOT ═══ -->
  <circle cx="60" cy="60" r="3" fill="#000" stroke="url(#g)" stroke-width="0.9"/>
  <circle cx="60" cy="60" r="1.2" fill="url(#g)"/>
</svg>
